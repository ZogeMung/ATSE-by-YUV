            <li style="margin-bottom:6px;"><strong>比例分配</strong>：将系统总增益按各话筒电平比例进行分配——声音大的话筒获得更多增益份额，安静的话筒被自动衰减</li>
            <li style="margin-bottom:6px;"><strong>NOM 控制</strong>：NOM (Number of Open Mics) 限制同时"开放"的等效话筒数量，防止多支话筒同时开启时系统增益失控</li>
            <li style="margin-bottom:6px;"><strong>实时响应</strong>：Attack 时间极短（0.5-10ms），某人开始说话时立即获得增益；Release 时间较长（0.1-2s），避免短暂的停顿造成增益剧烈波动</li>

30-150Hz, ±10dB)/Impedance(500Ω/2kΩ)/Pad(-15dB)",hardware:"UA 610 Console Module (Bill Putnam design, 1960s)",usage:"温暖电子管人声: Gain 推高至产生自然电子管压缩。贝斯 DI: Low Shelf 在 60Hz 提升增加低频重量。Impedance 切换: 500Ω 更温暖, 2kΩ 更开放。"},{id:"uad-v76",name:"V76 Preamplifier",brand:"UAD",cat:"Preamp",desc:"1950 年代德律风根/西门子 V76 电子管前置放大器。The Beatles 在 Abbey Road 录音室使用过的传奇设备。极致的温暖和音乐性, 超低噪声的电子管设计。",params:"Gain(0-76dB,步进式 6dB)/HPF(40Hz, 80Hz)/LPF(8kHz, 12kHz)/Output",hardware:"Telefunken/Siemens V76",usage:"管弦乐和弦乐: V76 的超高增益(76dB)和极低噪声适合远距离话筒摆位。人声: 温暖但不浑浊的电子管特性——与 1073 相比更纯净。"},{id:"uad-century",name:"Century Tube Channel Strip",brand:"UAD",cat:"Channel Strip",desc:"1960 年代定制电子管通道条——包含电子管前置放大器和 3 段 EQ。极简的控制产生极其丰富的电子管谐波。",params:"Mic Gain/EQ Low(100Hz)/Mid(1.5kHz, sweep)/High(10kHz)/Output",hardware:"Custom 1960s Tube Console Module",usage:"极简操作获得丰富的电子管色彩。特别适合需要快速获得温暖音色的场景。"},{id:"uad-1176",name:"UA 1176 Classic FET Compressor Collection",brand:"UAD",cat:"Compressor",desc:"Bill Putnam 设计的 FET 压缩器——Rev A (Blue Stripe, 1967)、Rev E (Blackface, 1973)、AE (Anniversary Edition) 和 LN (Low Noise) 多个版本。全部采用 FET 场效应管增益衰减, 超快 Attack(20μs-800μs), 独特的 All-Button(四键齐按)失真模式。",params:"Input 输入(控制阈值, 输入越大压缩越多)/Output 输出(补偿增益)/Attack 启动(20-800μs, 极快)/Release 释放(50ms-1.1s)/Ratio 压缩比(4:1, 8:1, 12:1, 20:1)/All-Button 模式(四键齐按)",hardware:"UREI/UA 1176LN (Rev A Blue Stripe, Rev E Blackface)",usage:'鼓室麦克风: All-Button 模式(British Mode)产生毁灭性的压缩失真——Led Zeppelin "When The Levee Breaks" 鼓声。人声: Ratio 4:1, 峰值衰减 5-7dB, Attack 最慢(800μs), Release 最快(50ms)。贝斯: Ratio 8:1 或 12:1, 衰减 7-10dB。Rev A 声音更温暖失真更大, Rev E 更干净精确。'},{id:"uad-la2a",name:"Teletronix LA-2A Leveler Collection",brand:"UAD",cat:"Compressor",desc:"光电电子管压缩器——T4 光学衰减器提供完全程序依赖的增益控制(无 Attack/Release 旋钮)。自动适应音频的动态特性, 产生最自然的压缩。Gray/Silver/LA-2 三个版本。",params:"Peak Reduction 峰值衰减(控制压缩量)/Gain 增益补偿(补偿衰减后的电平)/Limit-Compress 限制-压缩模式切换(限制模式压缩比更高)/VU Meter(输出/增益衰减)",hardware:"Teletronix LA-2A (Gray face 1960s, Silver face 1970s)",usage:"人声: 先将 Peak Reduction 推到最大, 然后慢慢回退直到压缩自然。理想的衰减量是 3-5dB(在 VU 表上可以看到指针摆动)。贝斯: LA-2A 的程序依赖特性使每个音符的压缩量相同, 非常均匀。"},{id:"uad-distressor",name:"Empirical Labs EL8 Distressor",brand:"UAD",cat:"Compressor",desc:"现代经典压缩器——数字控制的模拟压缩器, 可以模拟 LA-2A、1176、Fairchild 等多种经典压缩器的特性。British Mode 提供独特的谐波失真。Dist 2/3 模式增加二次/三次谐波。",params:"Input/Output/Attack(0.05-50ms)/Release(0.05-3.5s)/Ratio(1:1, 2:1, 3:1, 4:1, 6:1, 8:1, 10:1, 20:1, Nuke)/Detector HP(去除低频对压缩检测的影响)/British Mode(英式模式, 修改谐波特性)/Dist 2(二次谐波)/Dist 3(三次谐波)/Audio(宽带)/Link(立体声链接)",hardware:"Empirical Labs EL8 Distressor",usage:"鼓: British Mode + Ratio 4:1 + Attack 5ms + Release 0.2s——底鼓和军鼓的终极压缩。Nuke 模式(Ratio 20:1)用作限制器。Dist 2 或 3 增加厚度——电子管风格的谐波但不是真的电子管。"},{id:"uad-fairchild",name:"Fairchild 670/660 Compressor",brand:"UAD",cat:"Compressor",desc:"传奇电子管立体声压缩限制器——14 只电子管、20 个变压器, 仅生产了约 50 台。670(立体声)和 660(单声道)。极致的平滑压缩——高频压缩丝般顺滑。",params:"Input 输入增益/Threshold 阈值/Time Constant 时间常数(1-6, 1=最快 0.2ms attack/0.3s release, 5=Auto 0.8ms/5s, 6=最慢 0.8ms/25s)/Balance 平衡/DC Threshold 直流阈值(偏压控制, 影响谐波特性)",hardware:"Fairchild 670 (Rein Narma design, 1959)",usage:'混音总线: Time Constant 5(Auto)或 6, 仅衰减 1-2dB——极致的"glue"压缩。鼓总线: Time Constant 2-3。母带: 670 是母带处理的神器——极慢的 Time Constant 几乎完全不改变瞬态。'},{id:"uad-api2500",name:"API 2500 Stereo Bus Compressor",brand:"UAD",cat:"Compressor",desc:"API 2520 运算放大器驱动的立体声总线压缩器。Feed-Back(Old)和 Feed-Forward(New)双检测模式。Thrust 模式在侧链中加入高通滤波以保留低频能量。",params:"Threshold(-20-+10dB)/Ratio(1.5:1-∞:1)/Attack(0.03-30ms)/Release(0.05-3s)/Knee(Soft-Med-Hard)/Thrust(侧链高通, 保留低频)/Type(Old Feed-Back / New Feed-Forward)/Link(立体声链接百分比)",hardware:"API 2500",usage:"混音总线: Attack 30ms, Release Auto, Ratio 2:1, Thrust On, Knee Soft——这是 API 2500 的经典混音设置。鼓总线: Attack 1ms, Release 0.1s, Ratio 4:1, Thrust On 保留底鼓冲击力。Old 模式(Feed-Back)比 New 模式(Feed-Forward)更柔和。"},{id:"uad-dbx160",name:"dbx 160 Compressor/Limiter",brand:"UAD",cat:"Compressor",desc:"经典 VCA 压缩器——固定比率(∞:1 限制器模式)、可调速曲线的 RMS 压缩。极其简单的操作——只有 Threshold 和 Compression 两个主要控制。鼓的行业标准。",params:"Threshold(-40-+20dB)/Compression(压缩量, 0-40dB)/Output(-20-+20dB)/OverEasy(柔和拐点模式)",hardware:"dbx 160 (1976)",usage:"底鼓: Threshold 设为 -10dB, Compression 6-10dB——底鼓的经典冲击力。军鼓: OverEasy 模式, 较轻的压缩。160 的 RMS 检测对低频特别敏感。"},{id:"uad-manley-mu",name:"Manley Variable Mu",brand:"UAD",cat:"Compressor",desc:"电子管立体声限制器压缩器——T-Bar 可变 Mu 设计。独特的电子管增益衰减产生丰富的二次谐波。Attack 和 Release 通过单个旋钮联动控制。",params:"Input/Threshold/Attack(25-70ms, 慢启动最平滑)/Release(0.2-0.8s, 快释放)/Output/Stereo Link/MS Mode",hardware:"Manley Variable Mu",usage:'混音总线: Attack 最慢, Release 中速, 仅衰减 1-3dB——增加"重量感"和密度而不改变动态。母带: 极其平滑的电子管压缩。MS 模式可以独立控制 Mid 和 Side 的压缩。'},{id:"uad-la3a",name:"Teletronix LA-3A Audio Leveler",brand:"UAD",cat:"Compressor",desc:'固态版本的光电压缩器。比 LA-2A 更快的响应时间, 对中高频段有独特的"咬合"感。吉他录音的完美选择。',params:"Peak Reduction(峰值衰减)/Gain(增益补偿)/Limit-Compress 模式切换/Hi-Freq(高频侧链滤波)",hardware:"Teletronix LA-3A (1969)",usage:'电吉他: LA-3A 是电吉他的经典压缩器——Ratio 适中, 中高频的"咬合"使吉他更前冲。人声: Hi-Freq 模式可以产生比 LA-2A 更明亮的音色。'},{id:"uad-capitol-comp",name:"Capitol Mastering Compressor",brand:"UAD",cat:"Compressor",desc:"Capitol Records 录音棚定制的母带压缩器。极其透明的电子管压缩——专为母带处理设计的超低调失真。",params:"Threshold/Makeup Gain/Attack/Release/HPF Sidechain/Mix",hardware:"Capitol Studios Custom Mastering Compressor",usage:"母带处理: 极其透明的压缩——衰减 1-2dB 几乎不可感知。比 Fairchild 更现代、更干净的音色。"},{id:"uad-175b",name:"UA 175B Tube Limiter",brand:"UAD",cat:"Compressor",desc:"UA 175B 电子管限制器——1176 的前身。Bill Putnam 在 1960 年代设计的早期 FET 限制器。比 1176 更温暖、更慢。",params:"Input/Output/Attack/Release/Meter",hardware:"UA 175B (1960s)",usage:'需要电子管味道而非快速 FET 压缩的场景。人声和贝斯的替代选择——比 1176 更有"复古"音色。'},{id:"uad-pultec-eq",name:"Pultec Passive EQ Collection",brand:"UAD",cat:"EQ",desc:'Pultec EQP-1A 程序均衡器(1951) + MEQ-5 中频均衡器 + HLF-3C 高低通滤波器。被动式设计——无主动增益元件, 纯粹的电感和电容网络。同时衰减和提升低频的"Pultec Trick"是其最著名的特性。',params:"EQP-1A: Low Boost(20/30/60/100Hz, 0-13.5dB)/Low Atten(20/30/60/100Hz, 0-17.5dB)/High Boost(3/4/5/8/10/12/16kHz, 0-16dB)/Bandwidth(Sharp-Broad, 影响高频 Q 值)/MEQ-5: Dip(200/300/500/700Hz, 0-10dB 衰减)/Peak(1/1.5/2/3/4/5kHz, 0-8dB 提升)/HLF-3C: High Cut(5k/10kHz)/Low Cut(20/40/80/150Hz)",hardware:"Pultec EQP-1A (1951, Eugene Shenk design)",usage:'底鼓 "Pultec Trick": Low Boost 60Hz +10dB + Low Atten 60Hz -8dB——同时提升和衰减产生独特的低频曲线。人声: High Boost 10kHz 提升 3-5dB, Bandwidth Broad。贝斯: Low Boost 30Hz 增加超低频重量感。'},{id:"uad-massive-passive",name:"Manley Massive Passive EQ",brand:"UAD",cat:"EQ",desc:"电子管参量均衡器——独特的重叠频段设计和电子管驱动级。4 个频段 + 额外的高低通滤波器。标准版(录音混音)和母带版(更精确的步进控制)。搁架模式下的高频提升如丝般顺滑。",params:"Filter: HPF(22-260Hz)/LPF(5k-52kHz)/Band 1: Low Shelf/Peak(22-820Hz)/Band 2: Peak(68-2.7kHz)/Band 3: Peak(270Hz-10kHz)/Band 4: High Shelf/Peak(820Hz-27kHz)/Gain(±20dB 每频段)/Bandwidth(窄-宽, 0.5-4.5 Q)/Master Gain/EQ In-Out/电子管驱动(可独立调整输入电子管的谐波量)",hardware:"Manley Massive Passive (1998)",usage:'混音总线: High Shelf 在 12kHz 提升 2-3dB——"昂贵的空气感"。人声: Band 3 在 3kHz 提升 2dB 增加临场感。母带: 母带版提供更精确的步进控制, 适合极细微的调整。'},{id:"uad-neve-1073",name:"Neve 1073 Preamp & EQ Collection",brand:"UAD",cat:"EQ",desc:"经典 Neve 1073——Class A 晶体管设计 + Marinair(St Ives)变压器。3 段固定频率 EQ + 高通滤波器。1073(含前置放大)和 1073SE(不含前置放大, 仅 EQ)。",params:"Mic Gain(0-80dB, 步进式 5dB)/Trim(±10dB 精细调整)/EQ: High Shelf(10/12/16kHz, ±16dB)/Mid Band(360/700/1.6/3.2/4.8/7.2kHz, ±18dB, Peak)/Low Shelf(35/60/110/220Hz, ±16dB)/HPF(50/80/160/300Hz)/Output",hardware:"Neve 1073 (Rupert Neve, 1970)",usage:"电吉他: Mid 在 1.6kHz 提升——摇滚吉他的标志性中频。人声: High Shelf 在 12kHz 提升, Mid 在 3.2kHz 微量提升。贝斯: Low Shelf 在 60Hz 提升, HPF 50Hz 去除超低频。1073 的 EQ 使用电感器(不是电容器)——提升时的相位特性非常自然。"},{id:"uad-api550",name:"API 550A/560 EQ",brand:"UAD",cat:"EQ",desc:"API 经典均衡器——550A(3 段参量均衡)采用比例 Q 设计(频率越高 Q 值越宽)。560(10 段图示均衡, 每倍频程 1 段)。2520 运算放大器提供独特的 API 中频特性。",params:"550A: Low(50/100/200/300/400Hz, ±12dB)/Mid(200-5kHz sweep, ±12dB, 比例 Q)/High(5/7/10/12.5/15kHz, ±12dB)/560: 10 graphic bands(31/63/125/250/500/1k/2k/4k/8k/16kHz)",hardware:"API 550A (1960s) / API 560",usage:"鼓: 550A 在 10kHz 搁架提升——增加空气感和亮度。560 图示 EQ 用于快速调整鼓总线的整体音色。电吉他: 550A Mid 在 1.5kHz 提升, Q 自动变窄——精准的吉他中频塑形。"},{id:"uad-harrison",name:"Harrison 32C EQ",brand:"UAD",cat:"EQ",desc:'Harrison 32C 调音台著名的 4 段参量 EQ。极其宽广的 Q 范围(可调至非常窄的陷波)和独特的滤波器设计。Michael Jackson "Thriller" 使用的 EQ。',params:"HPF(25-3.15kHz, 18dB/oct)/LPF(160Hz-20kHz, 18dB/oct)/Low(40-600Hz)/Low-Mid(200-3.2kHz, Q 0.3-∞)/Hi-Mid(630Hz-10kHz, Q 0.3-∞)/High(1.5k-20kHz)",hardware:"Harrison 32C Console",usage:"人声: Hi-Mid 在 3.2kHz 提升配合极窄 Q——精准增加临场感。Hi-Mid 衰减配合宽 Q——减少人声刺耳。Mix bus: 极窄 Q 的衰减可以精确去除特定共振频率。"},{id:"uad-helios",name:"Helios Type 69 EQ",brand:"UAD",cat:"EQ",desc:"Helios 调音台的三段 EQ——1970 年代英国摇滚调音台的经典。被动式中频设计产生极其独特的曲线。Led Zeppelin、The Rolling Stones、Jimi Hendrix 等录音使用。",params:"Bass(50Hz, shelving, ±15dB)/Treble(10kHz, shelving, ±15dB)/Mid boost(1.4k-6kHz sweep, peak, 0-+15dB)/Mid cut(700Hz-3kHz sweep, dip, 0--15dB, 被动式)/EQ In-Out",hardware:"Helios Console EQ (1969, Dick Swettenham design)",usage:"摇滚鼓: 被动式中频衰减非常独特——不是普通 EQ 的衰减, 而是滤波式的音色变化。吉他: Mid boost 在 2.8kHz 获得经典的摇滚吉他中高频。"},{id:"uad-hitsville-eq",name:"Hitsville EQ",brand:"UAD",cat:"EQ",desc:"Motown Hitsville USA 录音棚(Deroit)定制的均衡器建模。Motown 灵魂乐和 R&B 标志性人声的幕后工具。简单三段 EQ 加上独特的前置级谐波。",params:"Bass(100Hz)/Treble(10kHz)/Presence(2-5kHz)/EQ In-Out/前置级 Drive",hardware:"Motown Custom EQ (Hitsville USA Studio A)",usage:"灵魂乐人声: Presence 提升获得 Motown 标志性的前冲人声。贝斯: Bass 提升 + 前置级 Drive 获得温暖的低频谐波。"},{id:"uad-lexicon480l",name:"Lexicon 480L Digital Reverb",brand:"UAD",cat:"Reverb",desc:"1986 年发布的传奇数字混响器——定义了 80-90 年代流行音乐的混响音色。Random Hall、Rich Plate、Small Ambience 等标志性算法。18-bit 转换器(当时最高规格)。",params:"Pre-Delay(0-240ms)/Reverb Time(0.1-99s, 中低频/高频可独立调整)/Decay/Room Size(房间尺寸)/Diffusion(扩散度)/EQ(4 段)/Bass Multiply(低频混响时间倍乘)/Crossover(分频点)/Spread(立体声宽度)",hardware:"Lexicon 480L (1986)",usage:"人声 Random Hall: 最经典的 480L 音色——Pre-Delay 80ms, RT 2.5s, Size Medium。鼓: Rich Plate——RT 1.8s 非常适合军鼓。混响中的 EQ 是精髓——减低频减少浑浊, 加高频增加光泽。"},{id:"uad-emt140",name:"EMT 140 Plate Reverb",brand:"UAD",cat:"Reverb",desc:"1957 年发布的传奇钢板混响器——物理金属板振动产生混响。极其密集的混响尾音(无颗粒感)。三块不同尺寸的板(单板/双板/三板)。",params:"Pre-Delay(0-250ms)/Decay Time(0.5-5s)/Damping(高频阻尼, 控制板振动衰减)/Plate Size(Small-Medium-Large)/Drive(输入驱动, 产生谐波饱和)/Wet-Dry",hardware:"EMT 140 Plate (1957, Elektro-Mess-Technik)",usage:"人声板混响: Decay 1.8s, Damping 适中, Large Plate——经典的 60-70 年代人声混响。军鼓: Decay 1.2s, Small Plate——紧凑的板混响不掩盖军鼓瞬态。"},{id:"uad-capitol",name:"Capitol Chambers",brand:"UAD",cat:"Reverb",desc:"Capitol Records 总部地下室著名的梯形混凝土混响室——4 个独立混响室, 每个具有不同的声学特性。Frank Sinatra、Beach Boys、Nat King Cole 等无数传奇使用的自然混响空间。",params:"Chamber Select(1-4)/Mic Position(近-远, 三对立体声话筒位置)/Pre-Delay(0-500ms)/Decay(0.5-4s)/EQ(高/低搁架)/Damping(高频吸收)/Drive(前置级驱动)",hardware:"Capitol Studios Chambers (1956, Les Paul design)",usage:"所有人声: Chamber 4 是最著名的——中等的混响时间, 丰富的中低频密度。弦乐: Chamber 1——最大的混响室, 最长的混响时间。自然的立体声扩散——不需要额外的人工立体声处理。"},{id:"uad-sound-city",name:"Sound City Studios",brand:"UAD",cat:"Reverb",desc:'著名的 Van Nuys 录音棚——Nirvana "Nevermind"、Fleetwood Mac "Rumours"、Tom Petty 等经典专辑录制地。著名的 Studio A 大房间的声学建模。动态房间音色。',params:"Room/Mic Position(3对)/EQ/Damping/Drive/Mix",hardware:"Sound City Studios (Los Angeles)",usage:"摇滚鼓组: Sound City 的鼓房间声是摇滚历史的标志——Nevermind 鼓声的核心。放置在鼓轨道的插入效果器而非 send/return 中。"},{id:"uad-lexicon224",name:"Lexicon 224 Digital Reverb",brand:"UAD",cat:"Reverb",desc:"1978 年发布的数字混响器——Lexicon 的第一台数字混响。比 480L 更暗、更温暖、更有限的参数但独特的复古数字混响音色。8 个预设程序。",params:"Pre-Delay(0-240ms)/Decay Time(0.6-70s)/Bass(低频混响时间)/Low-Mid(中低频混响时间)/Crossover(分频点)/High Cut(高频衰减)",hardware:"Lexicon 224 (1978)",usage:"比 480L 更暗更温暖——适用所有人声和乐器混响需求。224 的限制性反而使其具有独特的音乐性。仅 8 个程序意味着每个程序都经过精心调校。"},{id:"uad-emt250",name:"EMT 250 Electronic Reverb",brand:"UAD",cat:"Reverb",desc:'1976 年发布的世界上第一台商用数字混响器。仅 12-bit 转换器, 但独特的早期数字混响音色极其温暖——远非现代数字混响的"干净"。',params:"Pre-Delay/Decay/LF Decay/HF Decay/Delay/EQ",hardware:"EMT 250 (1976, Dr. Barry Blesser design)",usage:'复古数字混响的终极选择——12-bit 的"粗糙"恰是其魅力所在。适合需要 70-80 年代复古数字音色的场景。'},{id:"uad-ocean-way",name:"Ocean Way Studios",brand:"UAD",cat:"Reverb",desc:"Ocean Way Studios 录音棚 A 室的精确动态房间建模。可以实时改变麦克风和乐器在房间中的位置。",params:"Room/Mic Position/Distance/早期反射/晚期混响/阻尼/EQ",hardware:"Ocean Way Studios (Hollywood)",usage:"将任何音源放入世界级录音棚的声学空间中——这个插件不是传统混响, 而是声学空间仿真。直接插入音轨而非 send/return 使用效果最佳。"},{id:"uad-pure-plate",name:"Pure Plate Reverb",brand:"UAD",cat:"Reverb",desc:"简单直接的板混响——只有 3 个主要控制。极低的 CPU 占用使其成为大量轨道混响的理想选择。",params:"Decay(0.1-5s)/Low Cut(20-1kHz)/High Cut(1k-20kHz)/Pre-Delay(0-250ms)/Mix",hardware:"Generic Plate Model",usage:"低 CPU 占用率的主力板混响。简单有效——不需要复杂的参数就能获得好听的板混响音色。"},{id:"uad-studer",name:"Studer A800 Tape Recorder",brand:"UAD",cat:"Tape",desc:'Studer A800 24 轨多轨磁带录音机的精确建模。瑞士制造的机械精度——比 Ampex 更厚重、更有"重量感"的磁带音色。磁带的压缩、饱和、高频滚降和低频提升特性完全仿真。',params:"IEC/NAB EQ(两种均衡标准)/Bias(偏磁, 影响高频响应和失真特性)/Cal Level(校准电平, +3/+6/+9dB)/Speed: 7.5ips(复古厚重, 高频滚降低)/15ips(标准)/30ips(高保真, 高频更宽)/Tape Type(磁带配方: 456=更多失真, 900=更干净, GP9=现代高输出)/Input/Output/Repro-EQ",hardware:"Studer A800 (1978, Switzerland)",usage:"混音总线: 15ips + GP9 配方——现代摇滚混音的标准。鼓总线: 7.5ips + 456 配方——复古的压缩和饱和。30ips 用于需要更干净音色的场景。IEC EQ 比 NAB EQ 低频更平坦(NAB 低频提升更多)。"},{id:"uad-ampex",name:"Ampex ATR-102 Mastering Tape",brand:"UAD",cat:"Tape",desc:"Ampex ATR-102 母带立体声磁带机——比 Studer A800 更干净、更 Hi-Fi。母带工程师的首选磁带机。两轨 1/2 英寸磁带格式。",params:"Speed: 7.5/15/30ips(每档有不同音色)/Tape Type(456/900/GP9)/Cal Level/Repro-EQ/Bias/Input/Output/Transformer(变压器开关, 影响谐波特性)",hardware:"Ampex ATR-102 (1976, USA)",usage:"母带处理: 15ips + GP9——现代母带音色的基础。30ips = 几乎不可感知的磁带效果——用于只需要微量温暖的场景。Transformer On 增加额外的二次谐波。"},{id:"uad-fatso",name:"FATSO Jr/Sr",brand:"UAD",cat:"Saturation",desc:"Empirical Labs 的模拟磁带/电子管/变压器温暖特性处理器。Warmth(模拟磁带高频饱和)、Tranny(模拟变压器低频饱和)和压缩器结合为一体。",params:"Input/Compression(压缩量, 三种模式: Tracking/Buss/GP)/Warmth(磁带式高频滚降和饱和, 0-7)/Tranny(变压器式低频饱和, 开关)/Presence(高频提升)/Output",hardware:"Empirical Labs FATSO Jr (2000s)",usage:"鼓总线: Warmth 3-4 提供自然的磁带式高频滚降, Tranny On 增加低频重量。Warmth 7 = 极其明显的磁带压缩和饱和效果。Tracking 模式用于单轨, Buss 模式用于总线。"},{id:"uad-culture-vulture",name:"Thermionic Culture Vulture",brand:"UAD",cat:"Saturation",desc:'发烧级全电子管谐波失真处理器——从"几乎不可感知"的二次谐波增强到完全的失真破坏。三极管(T)、五极管(P1/P2/P3)四种模式, 每种具有不同的谐波结构。',params:"Drive(输入驱动, 控制失真量)/Bias(偏压, 影响失真对称性)/Output/Mode: T(Triode, 三极管模式=温暖)/P1(Pentode 1, 五极管模式=中等失真)/P2(Pentode 2, 更多三次谐波)/P3(Pentode 3, 完全失真)/Filter(低通滤波, 6kHz/8kHz/10kHz/无滤波)",hardware:"Thermionic Culture Vulture (UK, hand-built)",usage:'贝斯 DI: P1 模式, Bias 适中, Drive 适度——丰富的二次谐波增强贝斯厚度。合成器: P3 模式完全失真——毁灭性的电子管失真。鼓: T 模式微量 Drive——增加"模拟感"而不失真。'},{id:"uad-oxide",name:"Oxide Tape Recorder",brand:"UAD",cat:"Tape",desc:"简洁的磁带模拟器——比 Studer/Ampex 更省 CPU。快速实现磁带饱和效果, 适合大量轨道使用。",params:"Input/Speed(7.5/15/30ips)/Tape Type(456/900/GP9)/Output/Mix",hardware:"Generic Tape Model",usage:"低 CPU 占用率的磁带模拟, 适合放在每个轨道上。15ips + 456 = 标准复古磁带音色。"},{id:"uad-galaxy",name:"Galaxy Tape Echo",brand:"UAD",cat:"Delay",desc:"Roland RE-201 Space Echo 磁带延时的精确建模。磁带回声的温暖 WOW/Flutter(音高颤动)和自然的高频衰减。弹簧混响部分也完整建模。",params:"Mode Selector(12种回声音色组合, 1-3个回放磁头+弹簧混响)/Delay Time(延时时间)/Intensity(反馈量)/Echo Volume(回声音量)/Bass/Treble(回声的音色控制)/Reverb Volume(内置弹簧混响音量)/Motor Speed(马达速度, 改变延时时间和音高)",hardware:"Roland RE-201 Space Echo (1974)",usage:"吉他: Mode 5(单磁头+混响)——经典吉他磁带回声。人声: Mode 11(三磁头+混响)——丰富的多重回声。Motor Speed 降低——音高降低+延时变长, 独特的 Lo-Fi 效果。"},{id:"uad-ep34",name:"EP-34 Tape Echo",brand:"UAD",cat:"Delay",desc:"Maestro Echoplex EP-3 磁带延时的建模——Eddie Van Halen 经典吉他音色的一部分。磁带马达速度控制可产生微妙的音高调制。",params:"Echo Delay(延时时间, 60-650ms)/Echo Volume(回声音量)/Treble(高频控制)/Bass(低频控制)/Motor Speed(马达速度, 影响延时时间和音高)/Record Level(录音电平, 影响失真)",hardware:"Maestro Echoplex EP-3 (1960s)",usage:"Van Halen 吉他: 短延时(150-300ms), 单次回声——增加吉他厚度。Motor Speed 降低 10%——微妙的音高下降, 独特的复古磁带回声。"},{id:"uad-korg-sdd3000",name:"KORG SDD-3000 Digital Delay",brand:"UAD",cat:"Delay",desc:"1980 年代标志性数字延时器——U2 The Edge 使用的经典延时设备。调制延时是其标志性音色。13-bit 转换器提供独特的复古数字音色。",params:"Delay Time(0-2560ms)/Feedback(0-99%)/Modulation Depth(调制深度)/Modulation Speed(调制速度)/Filter(HPF+LPF, 塑造回声音色)/Waveform(调制波形选择)",hardware:"KORG SDD-3000 (1982)",usage:"The Edge 吉他: Delay 350ms, Feedback 35%, Modulation 适度——U2 吉他音色的核心。Filter 的高通可以去除回声中的低频, 使回声更清晰。"},{id:"uad-brigade",name:"Brigade Chorus",brand:"UAD",cat:"Modulation",desc:"Boss CE-1 Chorus Ensemble 的建模——世界上第一台合唱效果器。Roland Jazz Chorus 放大器内置合唱电路的原型。",params:"Speed(调制速度)/Depth(调制深度)/Level(效果音量)/Mode: Chorus(合唱)/Vibrato(颤音)",hardware:"Boss CE-1 Chorus Ensemble (1976)",usage:"Chorus 模式: 80 年代吉他合唱——Roland JC-120 的标志性清音。Vibrato 模式: 产生强烈的音高调制, 独特的模拟调制效果。"},{id:"uad-mxr-flanger",name:"MXR Flanger/Doubler",brand:"UAD",cat:"Modulation",desc:'MXR M-117 Flanger——Eddie Van Halen "Unchained" 标志性镶边音色的来源。模拟 BBD(Bucket Brigade Device)延时产生独特的"喷射"镶边效果。',params:"Width(镶边宽度/深度)/Speed(调制速度)/Manual(手动延迟时间, 0.5-10ms)/Regen(反馈量)/Mode: Flange(镶边)/Double(加倍)",hardware:"MXR M-117 Flanger (1976)",usage:"Van Halen 吉他: Manual 调到最低, Width 最大, Speed 中等——经典的 MXR 镶边。Doubler 模式: 短延时(5-15ms)产生立体声加倍效果, 丰富但不产生合唱的调制感。"},{id:"uad-studio-d",name:"Studio D Chorus",brand:"UAD",cat:"Modulation",desc:'Roland Dimension D 机架效果器的建模——1980 年代录音棚合唱的标准。极其微妙的立体声合唱——"不可感知"的宽度增强。',params:"Mode Selector(4种预设, 从极微妙到明显的合唱)/Input Level/Stereo Width",hardware:"Roland Dimension D SDD-320 (1979)",usage:'人声: Mode 1——微妙的立体声展宽, 几乎不可感知但却产生明显的"更宽"效果。合成器 Pad: Mode 4——更明显的合唱效果。全部四个 Mode 的调制速度都不同。'},{id:"uad-cooper",name:"Cooper Time Cube MkII",brand:"UAD",cat:"Delay",desc:"极其独特的延时设备——通过花园水管传输声音来产生延时！1960 年代 UREI 推出的产品, 提供 14ms 和 28ms 两种延迟。",params:"Delay Select(14ms/28ms)/Mix",hardware:"UREI Cooper Time Cube (1960s)",usage:"短延时用于人声加倍和立体声展宽。14ms 非常适合在单声道人声上产生自然的立体声感觉。"},{id:"waves-cla2a",name:"CLA-2A Compressor/Limiter",brand:"Waves",cat:"Compressor",desc:"Chris Lord-Alge 签名系列的 LA-2A 建模——光电电子管平滑压缩。CLA 个人调校的响应曲线, 比原始硬件更灵活。V16 新增 Auto Makeup Gain。",params:"Gain(增益补偿, 0-100)/Peak Reduction(峰值衰减, 控制压缩量, 0-100)/HiFreq(高频侧链滤波——提升可使压缩器对高频不敏感, 保留亮度)/Analog(模拟噪声开关, V16新增)/VU Meter(输出/增益衰减)",hardware:"Teletronix LA-2A (modeled by CLA)",usage:"人声: 将 Peak Reduction 推至 40-50, Gain 补偿 30-40——经典 LA-2A 压缩(3-5dB 衰减)。贝斯: 同样设置但 Peak Reduction 稍多。HiFreq 控制对保留人声亮度非常有帮助。"},{id:"waves-cla76",name:"CLA-76 Compressor/Limiter",brand:"Waves",cat:"Compressor",desc:"CLA 系列的 1176 FET 压缩器建模。Bluey(Rev A Blue Stripe)和 Blacky(Rev E Blackface)两个版本。",params:"Input/Output/Attack(1-7, 1=最快 20μs)/Release(1-7, 7=最快 50ms)/Ratio(4:1, 8:1, 12:1, 20:1, All-Button)/Analog/Meter",hardware:"UREI 1176LN",usage:"Bluey: Rev A 建模, 更温暖, 更多谐波失真。Blacky: Rev E 建模, 更精确, 更干净的压缩。All-Button(四键齐按): 极端压缩失真效果——鼓的经典。"},{id:"waves-cla3a",name:"CLA-3A Compressor/Limiter",brand:"Waves",cat:"Compressor",desc:"CLA 系列的 LA-3A 固态光电压缩器——比 LA-2A 具有更快的响应, 更明亮的音色。",params:"Gain/Peak Reduction/HiFreq/Analog",hardware:"Teletronix LA-3A",usage:'电吉他: LA-3A 对中高频的"咬合"使吉他声音更前冲。比 LA-2A 更适合需要瞬态保留的场景。'},{id:"waves-cla-epic",name:"CLA Epic",brand:"Waves",cat:"Delay",desc:"Chris Lord-Alge 的终极延时+混响效果器——4 个独立延时引擎 + 4 个独立混响引擎, 可随意组合。所有延迟和混响都经过 CLA 个人调校。",params:"Delay: Time/Feedback/Modulation/Filter per delay / Reverb: Type/Decay/Size/EQ per reverb / Master: Mix/EQ/Compression",hardware:"Custom CLA design",usage:"人声: SLAP 延时(120-140ms)+ PLATE 混响——CLA 的人声空间组合。吉他: TAPE 延时+ ROOM 混响。"},{id:"waves-ssl-comp",name:"SSL G-Master Buss Compressor",brand:"Waves",cat:"Compressor",desc:"SSL SL 4000 G 系列调音台的总母线压缩器——混音总线的行业标准 glue 压缩。VCA 增益衰减, RMS 检测。",params:"Threshold(-20-0dB)/Ratio(2:1/4:1/10:1)/Attack(0.1/0.3/1/3/10/30ms, 步进式)/Release(0.1/0.3/0.6/1.2/Auto, 步进式)/Makeup Gain(0-+24dB)",hardware:"SSL G-Series Quad Bus Compressor",usage:"混音总线: Attack 30ms + Auto Release + Ratio 4:1, Threshold 使压缩表摆动 2-4dB——经典母带/混音总线设置。Attack 10ms 适合更快的音乐。"},{id:"waves-ssl-ev2",name:"SSL EV2 Channel",brand:"Waves",cat:"Channel Strip",desc:"SSL 4000E 通道条的更新版本——新增 Brown Knob EQ(比 Black Knob 更宽的 Q 范围)和现代化的功能。",params:"Mic/Line/EQ(4段: Low/Low-Mid/Hi-Mid/High, Black-Brown Knob切换)/Comp(4:1-∞:1)/Gate/Expand/Filter(HPF/LPF)",hardware:"SSL 4000E Console (updated)",usage:"比原始 E Channel 更灵活的通道条——Brown Knob EQ 提供更宽范围的音色塑造。鼓和人声的标准通道条选择。"},{id:"waves-ssl-eq",name:"SSL E-Channel",brand:"Waves",cat:"Channel Strip",desc:"Waves 版本的 SSL 4000E 通道条——包含 Black Knob EQ、VCA 压缩器和门限/扩展器。",params:"HPF/LPF/EQ(4段, Black Knob)/Compressor(阈值/比率/释放)/Gate/Expander/Output",hardware:"SSL 4000E Console Channel",usage:"每条轨道的 SSL 处理链——EQ 用于音色塑形, 压缩用于动态控制, Gate 用于去除背景噪声。"},{id:"waves-abbey-road-plates",name:"Abbey Road Reverb Plates",brand:"Waves",cat:"Reverb",desc:"Abbey Road Studios 的 4 台传奇 EMT 板混响器的精确建模。每台板具有不同的尺寸和音色特征。",params:"Plate Select(4 plates: A/B/C/D)/Pre-Delay(0-500ms)/Decay(0.5-5s)/Bass Cut(20-2kHz)/High Cut(1k-20kHz)/Drive(输入谐波)/Mix",hardware:"Abbey Road EMT Plates (Studios 1-3)",usage:"Plate A(最大): 人声混响——丰富的密度和立体声宽度。Plate C(最小): 鼓混响——更紧凑, 不与瞬态冲突。Drive 控制: 增加模拟板混响前置放大器的谐波。"},{id:"waves-abbey-road-chambers",name:"Abbey Road Chambers",brand:"Waves",cat:"Reverb",desc:"Abbey Road 著名的 Studio 2 回声室的建模——The Beatles 大量使用的混响空间。STEED(Send-Tape-Echo-Echo-Delay)效果。",params:"Chamber Select/Pre-Delay/Decay/EQ/STEED Mode/Tape Speed",hardware:"Abbey Road Studio 2 Echo Chamber",usage:"The Beatles 的经典回声室效果。STEED 模式: 将信号先送入磁带延时, 再送入回声室——创造极其复杂的空间效果。"},{id:"waves-abbey-road-rs124",name:"Abbey Road RS124 Compressor",brand:"Waves",cat:"Compressor",desc:"Abbey Road 录音棚定制的电子管压缩器——改装自 Altec 436B。极其缓慢的释放时间(最长可达 30 秒)。",params:"Input/Output/Recovery(释放时间, 极慢)/Hold(保持时间)/Super Fuse(超级保险丝模式, 增加压缩比)",hardware:"Abbey Road RS124 (modified Altec 436B)",usage:"混音总线: Super Fuse 模式, Recovery 调至极慢——几乎恒定密度的压缩, 完美用于古典和爵士。"},{id:"waves-renaissance-comp",name:"Renaissance Compressor",brand:"Waves",cat:"Compressor",desc:'Waves 最经典的数字压缩器——平滑的 Opto 和温暖的 Electro 模式。"Warm" 饱和控制增加二次谐波。',params:"Threshold(-60-0dB)/Ratio(1:1-50:1)/Attack(0.5-50ms)/Release(5ms-5s)/Gain(0-24dB)/Mode(Opto/Electro)/Warm/ARC(Auto Release Control)",hardware:"Digital (Renaissance series)",usage:"人声通用压缩: Opto 模式 + Ratio 2:1 + 峰值衰减 3-5dB——几乎总是好听。Electro 模式用于需要更多控制力的场景。Warm 控制(+1-5)增加微妙的二次谐波温暖。"},{id:"waves-renaissance-reverb",name:"Renaissance Reverb",brand:"Waves",cat:"Reverb",desc:"Waves 最畅销的混响器——温暖、音乐性的算法混响。多种混响类型, 简单的控制产生专业效果。",params:"Reverb Type(Hall/Plate/Church/Room/Spring等)/Decay(0.1-10s)/Size/Diffusion/Pre-Delay(0-500ms)/EQ(高/低搁架)/Damping(高/低频吸收)",hardware:"Digital (Renaissance series)",usage:"主力混响: Hall——人声和乐器的通用混响。Plate——鼓和人声。Spring——吉他的复古弹簧混响。"},{id:"waves-renaissance-eq",name:"Renaissance Equalizer",brand:"Waves",cat:"EQ",desc:"经典的 R 滤波",hardware:"EMI RS56 (Abbey Road)",usage:"与 Pultec 不同但同样经典的被动式 EQ——RS56 的 Presence 控制非常独特, 位于中高频段但宽度堪比搁架 EQ。"},{id:"waves-idx",name:"IDX Intelligent Dynamics",brand:"Waves",cat:"Compressor",desc:"智能频率相关压缩器——多个检测器分析音频的不同频率范围, 根据频率内容智能调整压缩。",params:"Threshold/Ratio/Attack/Release/Detector HP/LP/Mix",hardware:"Digital",usage:'智能压缩——减少传统压缩器在低频触发时"pumping"的问题。复杂混音的理想压缩器。'},{id:"waves-torque",name:"Torque",brand:"Waves",cat:"Utility",desc:"鼓音调调整工具——在不改变鼓瞬态的情况下调整鼓的音高。不是传统的音高变换——专门针对鼓的频谱特性设计。",params:"Tone(音调, -12到+12半音)/Threshold/Speed/Output",hardware:"Digital",usage:'鼓音色调整: 将低音鼓的音高降低半音使其更深沉, 或提高军鼓使其更"紧"。在不改变鼓演奏感的情况下改变音色。'},{id:"waves-emoz",name:"EMO系列 (Q4/F2/D5)",brand:"Waves",cat:"EQ/Dynamics",desc:"Waves 的触屏优化系列——Q4(4段EQ)、F2(动态滤波器)、D5(5段动态)。专为触屏操作设计, 大幅简洁化的界面。",params:"Q4: 4段 EQ 每段一个控制点 / F2: 2个动态滤波器 / D5: 5段动态处理器",hardware:"Digital (Touch-optimized)",usage:"触屏混音的理想选择——简洁的界面在平板上非常易用。Q4 的频谱界面可以直观地拖拽频率节点。"},{id:"waves-curves-aq",name:"Curves AQ",brand:"Waves",cat:"EQ",desc:"自主均衡器——Spectral Targeting 技术分析音频并生成 5 条自定义 EQ 曲线。从源音频中学习频率特性并应用到目标音频。",params:"5 curves: Start-End frequencies per curve / Amount(每条曲线的量)/Spectral Targeting analysis",hardware:"Digital (AI-assisted)",usage:"AI 辅助的 EQ 匹配——分析参考音频的频谱曲线并应用到目标音频。比传统 EQ Matching 更智能。"},{id:"waves-curves-equator",name:"Curves Equator",brand:"Waves",cat:"EQ",desc:'动态共振抑制器——自动检测并衰减不需要的共振频率。侧链支持频率"去掩蔽"。',params:"Learn(学习共振)/Threshold/Amount/Sidechain input/Attack/Release",hardware:"Digital",usage:'与 Soothe2 类似的共振抑制——自动找到并衰减刺耳的频率。侧链"去掩蔽": 根据其他轨道的频率内容衰减当前轨道的特定频率。'},{id:"waves-inspire",name:"Inspire Virtual Instruments",brand:"Waves",cat:"Instrument",desc:"Waves 的虚拟乐器系列——Electric 88(电钢琴)、Grand 80(三角钢琴)、Electric 200(Wurlitzer)、Retro Keys(复古键盘)。",params:"Per instrument: Tone/Pickup/EQ/Reverb/Amp model",hardware:"Digital (Virtual Instruments)",usage:"无需外部 MIDI 键盘——可直接在 DAW 中使用。Electric 88 是 Fender Rhodes 的采样建模。"},{id:"waves-codex",name:"Codex Wavetable Synth",brand:"Waves",cat:"Instrument",desc:"波表合成器——数百个波表, 双振荡器, 多模式滤波器, 调制矩阵。",params:"2 Oscillators/Wavetable position/Filter/Envelope/LFO/Modulation Matrix/FX",hardware:"Digital",usage:"现代电子音乐合成——巨大的波表库和调制能力。比 Element 2 更复杂、更灵活。"},{id:"waves-flow-motion",name:"Flow Motion FM Synth",brand:"Waves",cat:"Instrument",desc:"混合 FM 合成器——结合 FM 合成和模拟减法合成的创新设计。1000+ 预设, 极其直观的 FM 矩阵。",params:"4 Operators/FM Matrix/Filter/Envelope/LFO/FX/Arpeggiator",hardware:"Digital",usage:"FM 合成去神秘化——Flow Motion 的 FM 矩阵极其直观, 比传统 FM 合成器容易操作得多。免费插件包的一部分。"},{id:"waves-element2",name:"Element 2 Virtual Analog Synth",brand:"Waves",cat:"Instrument",desc:"虚拟模拟合成器——双振荡器, 多模式滤波器, 虚拟模拟电路建模。400+ 预设。",params:"2 Oscillators/Mixer/Filter(4 modes)/Envelope(2 ADSR)/LFO(2)/FX/Arpeggiator",hardware:"Digital (Virtual Analog)",usage:"经典模拟合成器音色——Moog/Jupiter/Prophet 风格的虚拟模拟合成。"},{id:"waves-clarity-vx",name:"Clarity Vx / Vx DeReverb Pro",brand:"Waves",cat:"Audio Repair",desc:"神经网络驱动的降噪和去混响处理器。Clarity Vx(降噪)可以在不损失清晰度的情况下去除背景噪声。DeReverb Pro(去混响)去除录好的混响。",params:"Amount(降噪量)/Sensitivity/Ambience 保留/NR Mode(6 precision bands for DeReverb)",hardware:"Digital (Neural Network)",usage:"后期制作降噪: 去除空调、交通、电脑风扇噪声。去混响: 减少在硬墙房间录音的混响尾音。"},{id:"waves-sync-vx",name:"Sync Vx",brand:"Waves",cat:"Utility",desc:"ARA2 兼容的人声对齐工具——自动对齐叠录的人声轨的时间和音高。比手动对齐快得多。",params:"Reference track/Target track/Alignment amount/Timing/Pitch/Format",hardware:"Digital (ARA2)",usage:"人声叠录对齐: 自动将 Doubler 和 Harmonies 对齐到主人声的时间和音高。ARA2 意味着直接在 DAW 中工作, 无需录音或导出。"},{id:"waves-waves-tune",name:"Waves Tune",brand:"Waves",cat:"Pitch",desc:"精密的离线音高编辑工具——ARA2 兼容。图形化的音高编辑界面, 类似 Melodyne 但更简单。",params:"Pitch/Time/Formant/Vibrato/Speed/Note Transition",hardware:"Digital (ARA2)",usage:"精确的人声音高修正——比 Waves Tune Real-Time 更精密的手动编辑。ARA2 兼容意味着在 DAW 中直接分析音频。"}],Ga=[{name:"Neve 1073",cat:"Preamp/EQ",year:"1970",desc:"Class A 晶体管设计, 3 段固定频率 EQ(低频/中频/高频搁架), Marinair(St Ives)变压器。1970 年由 Rupert Neve 设计, 至今仍是录音棚标准。前置放大提供高达 80dB 的增益。",features:"3段固定频率EQ, 中频6个可选频率(360/700Hz/1.6/3.2/4.8/7.2kHz), 高通滤波器(50/80/160/300Hz), Class A 分立晶体管前置",advantage:'与 API 312(美式)对比: 1073 更"温暖""厚重", 中高频更具"音乐性"。变压器耦合产生自然的低频相位特性和高频滚降。',famous:"Led Zeppelin, Pink Floyd, Nirvana, 无数经典录音",scene:"人声录音、电吉他、鼓 Overhead——1073 是最通用的高端前置放大器之一。"},{name:"API 312/512c",cat:"Preamp",year:"1968",desc:'API 调音台的经典前置放大器模块。2520 运算放大器 + 2503 输出变压器。独特的 API 中频推力——比 Neve 更具"攻击性"。',features:"高达 65dB 增益, 2520 Op-Amp, 输出变压器耦合, Pad(-20dB), Phantom Power, 极性反转",advantage:'与 Neve 1073(英式)对比: API 更具"攻击性"和"前推力", 中频更突出。鼓和吉他的理想选择——API 使音源"咬合"得更好。',famous:"Fleetwood Mac, Radiohead, Foo Fighters",scene:'鼓 Overhead、电吉他音箱——API 的中频推力使乐器在混音中更容易"站起来"。'},{name:"SSL 4000 E/G",cat:"Console",year:"1979/1987",desc:'Solid State Logic 的调音台革命——E Series(1979)引入"Black Knob"EQ 和著名的 E Series 压缩器。G Series(1987)增加 G Series 总线压缩器和更宽的 EQ。80 年代至今最广泛使用的调音台。',features:"每通道: 4段EQ(Black-Brown Knob), VCA压缩/门限, HPF/LPF。总线的 Quad Compressor。Total Recall(数字控制模拟电路)。",advantage:"E vs G: E 的 EQ 更具侵略性(Black Knob, Q 值较宽), G 更平滑。G 的总线压缩器是 SSL 最著名的产品。",famous:"Dr. Dre, Max Martin, Timbaland, 现代流行和 Hip-Hop 的标志性调音台。",scene:'混音总线的 glue 压缩(Bus Compressor)。每通道的动态控制(压缩+门限)。SSL 的"声音"是现代流行音乐标准的一部分。'},{name:"Neve 88R/88RS",cat:"Console",year:"2001",desc:"Neve 的现代旗舰调音台——继承 80 系列的传统但全面现代化。88RS 通道条包含麦克风前置+4段全参量 EQ+动态处理器。Abbey Road、AIR Studios、Capitol 等顶级录音棚使用。",features:"每通道: Mic Pre(0-70dB步进式), 4段全参量EQ, VCA压缩/限制/门限, HPF/LPF。全数字控制。",advantage:'与 1073 相比: 88RS 更"现代""干净", EQ 更灵活(全参量), 动态处理更全面。1073 更"复古""有特质"。',famous:"Abbey Road, AIR Studios, Capitol Records——全球顶级录音棚的现代标准调音台。",scene:"管弦乐、大型合奏——88RS 的灵活性和干净度适合需要高动态范围的录音。"},{name:"Fairchild 670/660",cat:"Compressor",year:"1959",desc:"传奇电子管压缩器——14 只电子管、20 个变压器, 仅生产了约 50 台(670立体声)和更多 660 单声道。Rein Narma 设计。极致的平滑、温暖压缩——高频压缩丝般顺滑。",features:"可变 Mu 电子管增益衰减, 6 个 Time Constant(1=最快,6=最慢), Balance 和 DC Threshold 偏压控制。",advantage:"唯一的 Fairchild——没有其他压缩器能复制 670 的极端平滑特性。14 只电子管和 20 个变压器产生极其丰富的谐波。",famous:"The Beatles(Abbey Road), Pink Floyd, Motown——几乎所有 1960s 的传奇录音。",scene:"混音总线终极压缩(仅衰减 1-2dB 即可产生明显的密度变化)。母带处理。"},{name:"Teletronix LA-2A",cat:"Compressor",year:"1962",desc:"光电电子管压缩器——T4 光学衰减器的程序依赖特性(无手动 Attack/Release 控制)。自动适应音频动态, 产生最自然的压缩。Frank Sinatra 和 Michael Jackson 的人声标配。",features:"Peak Reduction(控制压缩量), Gain(增益补偿), Limit/Compress 模式, T4 光学单元(发光+光敏电阻)。",advantage:'与 1176 对比: LA-2A 更"平滑""自然"(光电检测), 1176 更"快速""有攻击性"(FET检测)。人声首选 LA-2A, 鼓首选 1176。',famous:"Frank Sinatra, Michael Jackson, 几乎每一张专业录音的人声。",scene:"人声、贝斯——程序依赖的压缩特性使每个音符的压缩量相同, 极其均匀。"},{name:"UREI 1176",cat:"Compressor",year:"1967",desc:"Bill Putnam 设计的 FET 压缩器——极快的 Attack(20μs)和独特的 All-Button 模式(四键齐按)产生极端的压缩失真效果。多个 Revision(Rev A Blue Stripe 1967, Rev E Blackface 1973)。",features:"FET 增益衰减, Attack 20-800μs, Release 50ms-1.1s, Ratio 4:1-20:1, All-Button 模式, 无 Threshold——Input 控制压缩量。",advantage:"与 LA-2A 对比: 1176 超快的 Attack 可以捕捉最尖锐的瞬态(鼓), All-Button 模式提供独特的失真特性(LA-2A 无此功能)。",famous:"Led Zeppelin 鼓, Michael Jackson 人声, 无数摇滚和流行录音。",scene:"鼓(All-Button 或 8:1), 人声(4:1 快 Attack), 贝斯(8:1 或 12:1)。"},{name:"Pultec EQP-1A",cat:"EQ",year:"1951",desc:'被动式程序均衡器——无主动增益元件, 纯电感和电容网络。同时衰减和提升低频的"Pultec Trick"是其最独特的特性。Eugene Shenk 设计。',features:"Low Boost(20/30/60/100Hz, 0-13.5dB), Low Atten(20/30/60/100Hz, 0-17.5dB), High Boost(3-16kHz, 0-16dB), Bandwidth(Sharp/Broad)。",advantage:"被动式 EQ 的独特性——无主动电路意味着无晶体管/电子管噪声和失真。同时提升和衰减低频: 在其他 EQ 上不可能。",famous:"几乎每一张 1950s-1970s 的录音——Pultec 是所有 Passive EQ 的鼻祖。",scene:"底鼓 Pultec Trick(Low Boost+Low Atten at 60Hz), 人声空气感(High Boost 10kHz), 贝斯(30Hz Boost)。"},{name:"Lexicon 480L",cat:"Reverb",year:"1986",desc:"数字混响的里程碑——定义了 80-90 年代的混响音色。Random Hall 算法至今仍是数字混响的黄金标准。18-bit 转换器。",features:"Random Hall, Rich Plate, Small Ambience 等标志性算法, 4段EQ, 独立的中低频-中高频混响时间控制, Spread 立体声扩散。",advantage:'Random Hall 算法——至今未被超越的混响密度和平滑度。18-bit 特有的"温暖"数字音色(相比现代 24-bit 混响)。',famous:"Michael Jackson, Madonna, U2, Phil Collins——定义了 80 年代的流行音乐混响。",scene:"人声 Random Hall(Pre-Delay 80ms, RT 2.5s), 军鼓 Rich Plate(RT 1.8s), 混音总线微量的 Hall 增加空间感。"},{name:"EMT 140 Plate",cat:"Reverb",year:"1957",desc:"世界上第一台人工混响器——物理金属板的振动产生极其密集的混响尾音。声音密度远超过现代数字混响。",features:"三块不同尺寸的金属板, 电磁驱动-拾音系统, Damping 机械阻尼(控制板振动衰减时间, 0.5-5s)。",advantage:"板混响的极高密度——无颗粒感。数字混响(即使是最好的)也无法完全复制物理板振动的复杂模式。",famous:"The Beatles, Pink Floyd, Motown——1960s-1970s 所有人声和乐器的标准混响。",scene:'人声(Decay 1.8s), 鼓(Decay 1.2s), 整套混音的"胶水"。'},{name:"Manley Massive Passive",cat:"EQ",year:"1998",desc:'电子管参量均衡器——独特的重叠频段设计, 纯电子管驱动。Baxandall 风格的搁架 EQ 是所有 EQ 中高频最"平滑"的。',features:"4段(低/中低/中高/高), 每段可在搁架和峰值间切换, 重叠频率设计, 电子管输出级, HPF/LPF。",advantage:'高频搁架——丝般顺滑, 无任何刺耳感。被动式 Baxandall 搁架——提升+15dB 也不会有"过分EQ"的感觉。',famous:"母带工程师的首选——Massive Passive 是所有高端母带棚的标配。",scene:"母带 EQ, 混音总线 EQ——高频提升时无与伦比的平滑。"},{name:"Empirical Labs Distressor",cat:"Compressor",year:"1995",desc:"现代经典——数字控制的模拟压缩器。模拟 LA-2A、1176、Fairchild 等多种经典压缩器的特性。British Mode + Dist 2/3 增加模拟风格的泛音。",features:"8 个压缩比(1:1 到 Nuke 20:1+), British Mode, Dist 2(二次谐波)/Dist 3(三次谐波), Detector HP(侧链高通), Audio Mode。",advantage:"一台 Distressor = LA-2A + 1176 + Fairchild + dbx 160 的多种组合。British Mode 是独创——产生类似于英国调音台压缩的谐波失真。",famous:"现代鼓录音的标准——几乎每个专业录音棚都有一台。",scene:"鼓(British Mode + 4:1), 人声(2:1 Opto风格), 贝斯(Dist 3 增加厚度)。"},{name:"API 2500",cat:"Compressor",year:"2000s",desc:"API 立体声总线压缩器——Feed-Back(Old)和 Feed-Forward(New)双模式。Thrust 模式保留低频能量。API 2520 运算放大器提供独特音色。",features:"Thrust(侧链HPF), Old(Feed-Back)-New(Feed-Forward), Knee(Soft-Med-Hard), 立体声 Link 可调。",advantage:'Thrust——保留低频的同时提供"glue"压缩。Old(Feed-Back)模式的压缩更"柔软", New(Feed-Forward)更"精确"。',famous:"混音总线和鼓总线的标准压缩器之一。",scene:"混音总线(Attack 30ms, Thrust On, Ratio 2:1), 鼓总线(Attack 1ms, Ratio 4:1)。"},{name:"Studer A800",cat:"Tape Machine",year:"1978",desc:'瑞士 Studer 公司制造的多轨磁带录音机。瑞士精密机械的巅峰——比同期 Ampex 更厚重、更有"重量感"的磁带音色。',features:"24 轨, IEC/NAB 均衡, 7.5/15/30ips, 3 种磁带配方兼容, 同步回放磁头。",advantage:'与 Ampex ATR-102(母带机)对比: Studer 更"温暖""厚重", Ampex 更"干净""精确"。多轨录音的理想选择。',famous:"无数 1980s 至今的经典专辑——Studer 定义了现代多轨录音的磁带音色。",scene:'多轨录音的磁带饱和——鼓、吉他、人声在 Studer 上获得独特的"重量感"。'},{name:"Ampex ATR-102",cat:"Tape Machine",year:"1976",desc:"美国 Ampex 公司的立体声母带磁带机。1/2 英寸两轨格式。比 Studer A800 更干净、更 Hi-Fi——母带工程师的首选。",features:"2 轨, 7.5/15/30ips, 变压器耦合输出(可选开关), 3 种磁带配方。",advantage:'与 Studer A800(多轨机)对比: Ampex ATR-102 更"干净""精确", 更适合母带。Transformer On 增加额外的二次谐波——微妙的温暖。',famous:"母带处理的行业标准——许多经典专辑的最终母带都经过 ATR-102。",scene:'母带处理——极微量的磁带饱和增加"完整性"。混音总线——比 Studer 更透明的磁带音色。'},{name:"Shadow Hills Mastering Compressor",cat:"Compressor",year:"2006",desc:'Shadow Hills Industries 旗舰母带压缩器。创始人 Peter Reardon。双级压缩架构: 第一级光学压缩(T4B 衰减器, 固定 2:1 比例), 第二级离散 Class-A VCA 压缩(6 个压缩比)。标志性的三变压器输出选择(Nickel 镍=高频光泽, Iron 铁=中频温暖, Steel 钢=低频厚重)。"Magic Eye"真空管峰值表。',features:"双级压缩(光学+VCA), 变压器选择(Nickel/Iron/Steel), 立体声/双单声道, 侧链 HPF 90Hz, 17 步进式旋钮, 硬线旁路。Class A 限量版(50台): Lundahl 输入变压器, Mogami 线缆手焊。",advantage:"独一无二的双级压缩架构——光学级提供平滑的增益衰减, VCA 级提供精确的动态控制。三变压器切换使一台设备拥有三种完全不同的音色。母带压缩的参考级设备。",famous:"Radiohead, Foo Fighters, Beck, Green Day, Coldplay, James Taylor",scene:"母带总线: 光学级微量衰减+镍变压器增加空气感。混音总线: 光学+VCA 两级压缩+铁变压器增加密度。鼓总线: VCA 级+钢变压器增加重量。"},{name:"Bricasti M7",cat:"Reverb",year:"2008",desc:"Bricasti Design 的旗舰数字混响器——被广泛认为是世界上最好的硬件混响器。MIT 工程师 Brian Zolner 和 Casey Dowdell 创立。双独立 DSP 引擎, 数百个精心调校的混响预设。极其密集、平滑的混响尾音——远超任何软件混响。",features:"双 DSP 引擎, 200+ 预设(大厅/房间/板/环境/非线性/空间), 12 个可调参数, 模拟输入输出级(Analog Devices 转换器), 平衡 XLR, AES/EBU 数字 I/O, MIDI 控制。",advantage:'与 Lexicon 480L 对比: M7 更"自然""真实", 更接近真实声学空间的密度。与 Bricasti 自家的软件混响对比: 硬件 M7 的尾音密度仍无法被软件完全复制。价格约 $3,700 USD。',famous:"几乎所有现代专业录音棚的标配混响器——是 2010s 至今的数字混响标准。",scene:"人声: Sunset Chamber 或 Large Hall。管弦乐: Concert Hall。鼓: Ambience 或 Small Room。M7 的密度使单声道音源也能产生丰富的立体声混响。"},{name:"Maag Audio EQ4 (EQ4M)",cat:"EQ",year:"2010s",desc:'Maag Audio 的经典 6 段均衡器——最著名的是其 "Air Band" 高频提升。Cliff Maag 设计(Nightpro EQ3D 的继任者)。Air Band 在 2.5k-40kHz 提供极其平滑的搁架提升——增加"空气感"而不刺耳。',features:"6 段: Sub(10Hz, 搁架), 40Hz(峰值), 160Hz(峰值), 650Hz(峰值), 2.5kHz(峰值), Air Band(2.5/5/10/20/40kHz, 搁架)。所有频段 ±5dB。",advantage:'Air Band 是 Maag EQ4 的独门绝技——在高频增加极其自然的"空气"和"光泽", 即使 +5dB 也不会刺耳或产生相位问题。Sub 段(10Hz)可以在不增加低频"轰鸣"的情况下增加"体重感"。',famous:'人声混音的必备 EQ——Air Band 是现代人声"空气感"的标准工具。母带工程师也大量使用。',scene:'人声 Air Band: 20kHz +3dB——自然的空气感。混音总线 Air Band: 2.5kHz +1-2dB——增加临场感。贝斯 Sub: 10Hz +2dB——增加超低频"体重"。'},{name:"Tegeler Audio Manufaktur VTRC",cat:"Compressor",year:"2010s",desc:"德国 Tegeler 公司的电子管压缩器——Vari Tube Recording Channel。融合了光学压缩(LA-2A风格)和电子管级的温暖。德国手工制造, 精密的电子管电路。",features:"光学压缩器(T4 风格), 电子管增益级(ECC83/12AX7), 变压器耦合输入输出, 立体声链接, 高通侧链。",advantage:'德国精密制造——比美式设备更"干净", 但电子管提供足够的温暖。LA-2A 风格的光学压缩 + 德国工程的精确性 = 独特的音色融合。',famous:"欧洲录音棚的高端选择。",scene:"人声: 光学压缩的平滑 + 电子管的温暖。母带: 微量压缩 + 变压器音色。"},{name:"SPL Transient Designer",cat:"Dynamics",year:"1998",desc:"SPL(Sound Performance Lab)的革命性动态处理器——独立控制 Attack(起音)和 Sustain(尾音)的包络, 不使用压缩。两个旋钮即可完全重塑瞬态。德国工程。",features:"Attack(±15dB, 增强/衰减起音 0-2.5ms), Sustain(±24dB, 增强/衰减尾音), 无 Threshold/Ratio/Attack/Release——完全不同的处理方式。",advantage:"与传统压缩器对比: Transient Designer 不改变持续信号的电平——只改变起音和尾音。两个旋钮的操作比压缩器直观得多。",famous:'鼓混音的必备工具——Attack 增强使鼓声"前冲", Sustain 减少使鼓声更"紧"。',scene:"鼓: Attack +3-5dB 增加冲击力, Sustain -3-5dB 减少房间声。原声吉他: Attack -2dB 减少拨弦声。"},{name:"Bricasti M7 (Reissue)",cat:"Reverb",year:"2020s",desc:"Bricasti M7 的更新版本——保持了原始 M7 的经典音色, 同时增加了新的预设和改进的 DSP。立体声混响的终极硬件。",features:"改进的 DSP, 新预设(Fusion IR 系列), 增强的显示和控制, USB 控制。",advantage:"与原始 M7 对比: 音色相同, 新增预设和改进的用户界面。仍然是硬件混响的黄金标准。",famous:"顶级录音棚的标配。",scene:"同原始 M7。"},{name:"Tube-Tech CL 1B",cat:"Compressor",year:"1990s",desc:"丹麦 Tube-Tech 的经典电子管光电压缩器——人声压缩的北欧标准。全电子管设计, 增益衰减元件使用光电探测器(T4 风格), 极其平滑自然的压缩特性。前置放大使用 ECC83 和 ECC82 电子管。",features:"电子管增益级, 光电衰减, Ratio(2:1-10:1 连续可调), Attack(0.5-300ms)/Release(50ms-10s 连续可调), 增益补偿, VU 表, 平衡 XLR I/O。",advantage:'与 LA-2A 对比: CL 1B 有更灵活的 Attack/Release 控制(LA-2A 是固定的)。声音介于 LA-2A 的温暖和 1176 的精确之间。北欧"干净"的电子管声音——温暖但不浑浊。',famous:"北欧流行音乐人声的标配——Bjork, Lykke Li 等北欧艺人的工程师大量使用。全球高端录音棚的常驻设备。",scene:"人声: Ratio 3:1, Attack 慢(50ms), Release 中(0.5s), 衰减 3-5dB。贝斯: Ratio 4:1, Attack 快(5ms)。"},{name:"Neve 33609",cat:"Compressor",year:"1970s",desc:"Neve 的立体声二极管桥压缩器——Neve 经典的总线压缩器。比 SSL G-Bus 更温暖、更具音乐性的压缩特性。2254 的继任者, 增加了立体声链接和更灵活的 Ratio 控制。",features:"二极管桥增益衰减, 5 个 Ratio(1.5:1-6:1), Attack(3ms/6ms), Release(100ms/400ms/800ms/1.5s/Auto), 立体声链接, 输出增益, 硬线旁路。",advantage:'与 SSL G-Bus Comp 对比: 33609 更"音乐性""温暖"(二极管桥 vs VCA), SSL 更"干净""有力"。33609 的 Auto Release 是所有总线压缩器中最自然的之一。',famous:"混音总线的经典选择——Neve 的声音。许多经典专辑的混音都通过了 33609。",scene:"混音总线: Ratio 1.5:1, Recovery Auto, 仅衰减 2-3dB——自然的 glue 压缩。鼓总线: Ratio 2:1, Recovery 400ms。"},{name:"Chandler Limited TG1",cat:"Compressor",year:"2000s",desc:"Chandler Limited 对 Abbey Road EMI TG12413 限制器的现代复刻。原版 TG12413 是 The Beatles、Pink Floyd 在 Abbey Road 使用的压缩限制器。Wade Goeke 精确复刻了原始设计。",features:"FET 增益衰减, 连续可调的 Hold 时间, 立体声链接, 输入输出变压器, Chandler 定制的 Zener 二极管限制电路。",advantage:"独一无二的 Zener 二极管限制器音色——介于 FET 压缩(1176)和电子管压缩(Fairchild)之间的独特压缩特性。Abbey Road 的经典音色。",famous:"The Beatles(Abbey Road), Pink Floyd(The Dark Side of the Moon)——TG12413 是 Abbey Road 录音室从 1960s-1970s 的标准限制器。",scene:"鼓总线: Hold 时间短, 产生紧凑的立体声声场。混音总线: Hold 时间长, 产生自然的母带级压缩。"},{name:"Chandler Limited Curve Bender",cat:"EQ",year:"2010s",desc:'Chandler Limited 对 EMI TG12345 母带均衡器的复刻——Abbey Road 的母带 EQ。与 TG1 压缩器配套。4 段固定频率 EQ 配合独特的"弯曲曲线"。',features:"4 段 EQ(Treble/Presence/Bass/Low Boost, 每段可选 3 个频率), Shelving/Peak 可选, 输入输出变压器。",advantage:"母带 EQ 的经典——与 Pultec 和 Massive Passive 并列为三大母带 EQ。TG12345 的搁架曲线比大多数 EQ 更平滑。",famous:"Abbey Road 母带室的标配——The Beatles, Pink Floyd 等录音的最终音色。",scene:"母带: Treble 提升增加空气感, Bass 提升增加重量。混音总线: 微量搁架调整——比参数 EQ 更自然。"},{name:"GML 8200",cat:"EQ",year:"1980s",desc:'George Massenburg Labs 的参数均衡器——Massenburg 本人是"参量 EQ"概念的发明者。8200 是参量 EQ 的精髓——5 段全参量, 极端透明, 手术刀般的精度。',features:"5 段全参量(Freq/Gain/Q 独立可调), Q 范围 0.2-20(从极端窄到极端宽), ±20dB 增益范围, 每段可独立旁通。",advantage:"与其他 EQ 对比: 8200 的声音是完全透明的——你调整的是频率, 不是音色。手术刀级别的精度——可以去除其他 EQ 无法触及的窄带共振。",famous:"母带工程师的首选 EQ——George Massenburg 的设计是母带 EQ 的终极参考。",scene:"母带: 极其精确的频率调整, 极窄 Q 的共振去除。混音: 透明的高频提升——增加空气感而不改变音色。"},{name:"Cranesong STC-8",cat:"Compressor",year:"2000s",desc:'Cranesong 创始人 Dave Hill(2025年去世)设计的母带压缩器。极其干净的 VCA 压缩——"你感觉不到它在工作, 但你听到声音变好了"。大量用于母带室和高端混音。',features:"VCA 增益衰减, 3 种压缩模式(A/B/C, 不同谐波特性), 连续可调的所有参数, Ki(谐波控制), 立体声链接。",advantage:"母带压缩中最干净的——比 Manley Variable Mu 更透明, 比 SSL Bus Comp 更精确。Ki 控制可以调整二次/三次谐波——从完全干净到微妙的模拟色彩。",famous:"2025年 Dave Hill 去世——STC-8 成为传奇。母带工程师的必备工具之一。",scene:"母带: 模式 A, 微量压缩(1-2dB), Ki 最小——完全的透明控制。"},{name:"Cranesong Phoenix",cat:"Tape/Saturation",year:"2000s",desc:"Cranesong 独特的磁带/模拟饱和处理器——5 种完全不同的色彩(Golden 金色/Luminescent 光亮/Iridescent 虹彩/Radiant 光辉/Dark Essence 暗质)。不是传统磁带模拟, 而是 Crane Song 独创的谐波增强。",features:"5 种色彩, 独立控制谐波量, 无磁带噪声/抖动——纯谐波增强, 输入输出电平匹配。",advantage:'与磁带模拟插件对比: Phoenix 不模拟任何特定磁带机——它提供的是"理想的模拟色彩"。5 种色彩覆盖了从温暖到激进的全部范围。',famous:'母带工程师的秘密武器——Phoenix 的 Golden 模式是母带中最受欢迎的"温暖"效果。',scene:"母带: Golden + 微量 = 增加完整性和密度。混音总线: Luminescent 增加宽度和深度。"},{name:"Eventide H3000 Ultra-Harmonizer",cat:"Multi-FX",year:"1986",desc:"Eventide 的传奇多效果处理器——定义了 80 年代至今的创意音效。Micropitch Shift(微音高变换, ±9cents)创造极其丰富的立体声加倍。Crystals(晶体回声)、Reverse Shift(反向音高)、Diatonic Shift(音阶变换)等数百种算法。",features:"立体声微音高变换(±9cents), Crystals(颗粒音高回声), 调制延时, 滤波, 2 个独立 DSP 引擎, 350+ 预设。",advantage:'Micropitch Shift 是 H3000 最著名的算法——至今仍被所有现代效果器复刻。比后来的 H4000/H9000 更"有性格"的声音。',famous:"Steve Vai, Eddie Van Halen, Brian Eno, 无数 80s-90s 录音。Micropitch Shift 至今仍是人声加厚的标准效果。",scene:"人声加厚: Micropitch Shift ±9cents Left, -9cents Right——丰富的立体声加倍。吉他: Crystals——经典的 Eventide 空间效果。"},{name:"AMS RMX16",cat:"Reverb",year:"1982",desc:'英国 AMS(Audio & Music Systems)的数字混响器——Nonlin(非线性, 门控混响)是其最著名的算法。Nonlin 创造了 1980s 鼓声的革命——Phil Collins "In The Air Tonight" 的鼓声。',features:"9 种算法(Nonlin/Ambience/Hall/Plate/Room/Chorus等), 12-bit 转换器, LED 显示。",advantage:'Nonlin 算法——门控混响的发明者。至今没有任何插件能完美复制 AMS RMX16 的 Nonlin 音色。12-bit 转换器的"粗糙"正是其魅力。',famous:'Phil Collins 鼓声, Kate Bush "Hounds of Love", Peter Gabriel "So"。',scene:"军鼓: Nonlin——1980s 鼓声的定义。人声: Ambience——自然的空间感。"},{name:"TC Electronic 2290",cat:"Delay",year:"1985",desc:"丹麦 TC Electronic 的数字延时器——机架延时的黄金标准。极其干净的延时、调制和动态控制。Robben Ford、The Edge 等吉他手的经典延时设备。",features:"延时时间(0-999ms, 可扩展到 1998ms), 调制(深度+速度+波形), 动态控制(Ducking), 采样器功能, MIDI 控制。",advantage:'数字延时中最"干净"最"动态"的——Ducking 功能使回声在演奏时自动衰减, 停止时回声响亮。至今仍是数字延时的参考标准。',famous:"Robben Ford, The Edge, David Gilmour——2290 是 80-90s 吉他延时的首选。",scene:"吉他: 350ms 延时 + Ducking——The Edge 风格的动态回声。人声: 短延时(50-120ms)加倍。"}],Wa=[{name:"FabFilter Pro-Q 4",cat:"EQ",desc:"现代参量均衡器的标杆——动态 EQ 模式(每段独立压缩/扩展)、频谱抓取(点击频谱直接创建 EQ 节点)、线性相位模式、环绕声/沉浸式音频支持。Pro-Q 4 新增频谱抓取和改进的线性相位模式。",price:"$179",bestFor:"所有需要精确 EQ 的场景——从录音到母带的唯一 EQ 需求。"},{name:"FabFilter Pro-L 2",cat:"Limiter",desc:"现代母带限制器的标杆——True Peak 限制、多种算法(透明/Punchy/Dynamic/Allround)、全面的响度计和 True Peak 检测。",price:"$199",bestFor:"母带处理、最终输出限制——确保流媒体响度兼容。"},{name:"FabFilter Pro-C 2",cat:"Compressor",desc:"现代压缩器的标杆——8 种压缩模式(包括 Vocal、Mastering、Punch、Pumping)、全面的侧链 EQ、Auto Gain 和 Auto Release。",price:"$179",bestFor:"所有需要压缩的场景——从人声到总线的通用压缩器。"},{name:"Soundtoys Effect Rack",cat:"Multi-FX",desc:"包含 Decapitator(饱和)、EchoBoy(延时)、Little AlterBoy(人声变调)、Crystallizer(颗粒反转回声)、MicroShift(立体声展宽)等 14 个创意效果器。每个插件都是行业标杆。",price:"$499 (套装)",bestFor:"创意音效设计、混音色彩——从微妙的模拟温暖到极端的音效实验。"},{name:"iZotope RX 11",cat:"Audio Repair",desc:"音频修复的终极工具——降噪、去嘶声、去齿音、去混响(Dereverb)、频谱编辑(Spectral Editor)、De-click、De-clip。Advanced 版支持多通道(环绕声/Atmos)。",price:"$399-$1599",bestFor:"后期制作、广播、音频修复——修复几乎任何音频问题。"},{name:"iZotope Ozone 11",cat:"Mastering",desc:"完整的母带处理套件——EQ、压缩、限制、立体声成像、激励器、音调平衡控制。AI 辅助母带(Master Assistant)自动分析音频并生成母带曲线。",price:"$249-$499",bestFor:"从零开始的完整母带处理流程——AI 辅助或完全手动。"},{name:"Melodyne 5",cat:"Pitch Correction",desc:"Celemony 的音高/时间修正软件——DNA 直接音符访问技术可以编辑复音音频中的单个音符。行业标准的音高修正(比 Auto-Tune 更自然)。",price:"$99-$699",bestFor:"人声调音、时间修正、复音音频编辑——音乐制作中最强大的音频编辑工具。"},{name:"Valhalla DSP Bundle",cat:"Reverb/Delay",desc:"独立开发者 Sean Costello(瑞典)的高质量混响和延时插件。VintageVerb(经典数字混响)、Room(房间建模)、Delay(磁带/BBD/数字延时)、Plate(板混响)、Supermassive(免费, 巨大的混响/延时空间)。",price:"$50/个",bestFor:"性价比最高的混响和延时插件——个人开发者的品质与价格比无人能及。"},{name:"Slate Digital All Access Pass",cat:"Subscription",desc:"Steven Slate 的全套插件订阅——Virtual Mix Rack(模拟建模通道条)、Virtual Tape Machines、Virtual Buss Compressors、Fresh Air(免费高频激励器)。包含 SSL、Neve、API、Fairchild 等经典设备的建模。",price:"Subscription ($14.99/mo)",bestFor:"需要大量模拟建模插件的混音师——订阅模式可访问所有 Slate 产品。"},{name:"Plugin Alliance Mega Bundle",cat:"Subscr
